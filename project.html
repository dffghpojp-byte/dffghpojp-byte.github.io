<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>プロジェクト詳細</title>
<style>
  :root {
    --mint:   #6cbfab;
    --mint-l: #d4f5ea;
    --blue-l: #e0f2fb;
    --pink:   #d87aaa;
    --pink-l: #fbe8f2;
    --purple-l: #ece4fb;
    --text:   #4a5a5a;
    --text-s: #8a9494;
    --bg: linear-gradient(160deg, #e8f7f2 0%, #eaf3fb 35%, #f3edfb 70%, #fdf0f5 100%);
    --radius: 18px;
    --radius-sm: 10px;
    --shadow: 0 6px 24px rgba(150,190,200,0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
    color: var(--text);
    background: var(--bg);
    background-attachment: fixed;
    min-height: 100vh;
    line-height: 1.6;
  }

  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(180,220,210,0.3);
    padding: 0 24px;
    display: flex; align-items: center; gap: 12px;
    height: 52px;
  }
  .back-btn {
    font-size: 13px; font-weight: 700; color: var(--mint);
    text-decoration: none; padding: 5px 12px;
    border-radius: 20px; background: var(--mint-l);
    transition: opacity 0.15s;
  }
  .back-btn:hover { opacity: 0.75; }
  .nav-title {
    font-size: 13px; color: var(--text-s); font-weight: 600;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .container {
    max-width: 720px; margin: 0 auto;
    padding: 32px 24px 80px;
  }

  /* ── ヘッダー ── */
  .proj-header {
    background: rgba(255,255,255,0.88);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid rgba(255,255,255,0.6);
    padding: 28px 32px;
    margin-bottom: 20px;
  }
  .proj-tags {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;
  }
  .tag {
    font-size: 11px; font-weight: 700;
    padding: 4px 13px; border-radius: 20px;
  }
  .tag-mint   { background: var(--mint-l); color: #47998a; }
  .tag-pink   { background: var(--pink-l); color: var(--pink); }
  .tag-purple { background: var(--purple-l); color: #8b6ec4; }
  .tag-blue   { background: var(--blue-l); color: #5a99bb; }
  .proj-title {
    font-size: 24px; font-weight: 800; color: #5a6e8a;
    line-height: 1.3; margin-bottom: 10px;
  }
  .proj-desc {
    font-size: 14px; color: var(--text-s); line-height: 1.8;
  }
  .proj-link-row {
    margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap;
  }
  .btn {
    font-size: 12px; font-weight: 700;
    padding: 7px 18px; border-radius: 20px; text-decoration: none;
    border: 1.5px solid transparent; transition: all 0.15s;
    display: inline-block;
  }
  .btn-primary {
    background: linear-gradient(90deg, var(--mint), #5aabbc);
    color: white;
  }
  .btn-primary:hover { opacity: 0.85; }

  /* ── 画像ギャラリー ── */
  .section-title {
    font-size: 13px; font-weight: 800; color: var(--text-s);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 12px; margin-top: 24px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, rgba(150,200,190,0.4), transparent);
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 8px;
  }
  .gallery-item {
    position: relative; border-radius: var(--radius-sm);
    overflow: hidden; background: rgba(255,255,255,0.6);
    border: 2px dashed rgba(150,200,190,0.4);
    aspect-ratio: 4/3;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: border-color 0.2s, background 0.2s;
  }
  .gallery-item:hover { border-color: var(--mint); background: var(--mint-l); }
  .gallery-item.has-image { border-style: solid; border-color: rgba(255,255,255,0.6); }
  .gallery-item img {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
  }
  .gallery-item input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
  }
  .gallery-placeholder {
    text-align: center; pointer-events: none;
  }
  .gallery-placeholder .icon { font-size: 24px; display: block; margin-bottom: 4px; }
  .gallery-placeholder p { font-size: 11px; color: var(--text-s); }
  .gallery-del {
    position: absolute; top: 6px; right: 6px;
    background: rgba(255,255,255,0.85); border: none;
    border-radius: 50%; width: 24px; height: 24px;
    font-size: 14px; cursor: pointer; display: none;
    align-items: center; justify-content: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    z-index: 2;
  }
  .gallery-item.has-image .gallery-del { display: flex; }
  .gallery-del:hover { background: #fce; }

  .add-image-btn {
    width: 100%; padding: 12px;
    border: 2px dashed rgba(150,200,190,0.5);
    border-radius: var(--radius-sm);
    background: transparent; cursor: pointer;
    font-size: 12px; font-weight: 700; color: var(--mint);
    transition: all 0.15s; margin-top: 8px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .add-image-btn:hover { background: var(--mint-l); border-color: var(--mint); }

  /* ── メモ ── */
  .memo-box {
    background: rgba(255,255,255,0.88);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid rgba(255,255,255,0.6);
    padding: 24px 28px;
    margin-top: 16px;
  }
  .memo-area {
    width: 100%; min-height: 140px;
    border: 1.5px solid rgba(150,200,190,0.3);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-family: inherit; font-size: 13px; color: var(--text);
    line-height: 1.8; resize: vertical;
    background: rgba(255,255,255,0.7);
    transition: border-color 0.15s;
    outline: none;
  }
  .memo-area:focus { border-color: var(--mint); }
  .memo-saved {
    font-size: 11px; color: var(--mint); margin-top: 6px;
    opacity: 0; transition: opacity 0.3s;
  }
  .memo-saved.show { opacity: 1; }

  .save-notice {
    font-size: 11px; color: var(--text-s);
    background: var(--blue-l); border-radius: 8px;
    padding: 8px 14px; margin-top: 12px; line-height: 1.6;
  }

  /* ── パスワードロック ── */
  .lock-btn {
    margin-left: auto;
    background: none; border: none; cursor: pointer;
    font-size: 16px; color: var(--text-s); padding: 4px 8px;
    border-radius: 8px; transition: background 0.15s;
    opacity: 0.5;
  }
  .lock-btn:hover { background: var(--mint-l); opacity: 1; }
  .edit-section { display: none; }
  .edit-section.unlocked { display: block; }

  @media (max-width: 480px) {
    .container { padding: 20px 16px 60px; }
    .proj-header { padding: 20px 20px; }
    .gallery { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<nav>
  <a class="back-btn" href="index.html">← 一覧に戻る</a>
  <span class="nav-title" id="nav-title"></span>
  <button class="lock-btn" id="lock-btn" title="編集モード">🔒</button>
</nav>

<div class="container">
  <div class="proj-header">
    <div id="proj-gallery-static" style="margin-bottom:18px;"></div>
    <div class="proj-tags" id="proj-tags"></div>
    <h1 class="proj-title" id="proj-title">読み込み中…</h1>
    <p class="proj-desc" id="proj-desc"></p>
    <div class="proj-link-row" id="proj-links"></div>
  </div>

  <div id="related-section" style="display:none; margin-top:16px;">
    <p class="section-title">🔗 関連プロジェクト</p>
    <div id="related-list" style="display:flex; flex-direction:column; gap:10px;"></div>
  </div>

  <div class="edit-section" id="edit-section">
    <div class="memo-box">
      <p class="section-title">📷 画像</p>
      <div class="gallery" id="gallery"></div>
      <button class="add-image-btn" id="add-image-btn">＋ 画像を追加</button>
      <p class="save-notice">💡 画像はこのブラウザに保存されます。GitHub に公開するには <code>images/</code> フォルダに追加してください。</p>
    </div>

    <div class="memo-box" style="margin-top:16px;">
      <p class="section-title">📝 メモ・詳細テキスト</p>
      <textarea class="memo-area" id="memo-area" placeholder="制作過程・こだわり・使用ツールなど、自由に書いてください…"></textarea>
      <p class="memo-saved" id="memo-saved">✓ 保存しました</p>
      <p class="save-notice">💡 メモはこのブラウザに自動保存されます。</p>
    </div>
  </div>
</div>

<script>
const PROJECTS = {
  "stamp-cutter": {
    title: "LINE スタンプ カッター",
    desc: "一枚のシート画像から最大40個のスタンプ・絵文字を自動切り出しできるWebアプリ。背景色の透過、グリッド分割ラインのドラッグ調整、APNGアニメーション出力にも対応。Claude AI を使って開発。",
    tags: [["Claude AI","tag-blue"],["Web アプリ","tag-mint"]],
    link: { label: "▶ アプリを開く", url: "stamp-cutter.html" },
    related: [{ id: "line-stamps", note: "企画で生成した画像をこのツールで仕上げ" }]
  },
  "work-report": {
    title: "作業報告テンプレート作成ツール",
    desc: "スプレッドシートの作業管理システムと連携し、報告テンプレートを自動生成するツール。Claude AI を使って開発。",
    tags: [["Claude AI","tag-blue"],["スプレッドシート連携","tag-purple"]],
    related: [{ id: "spreadsheet", note: "このツールと連携する作業管理システム" }]
  },
  "tab-duplicate": {
    title: "ブラウザタブ複製ボタン",
    desc: "現在のタブをワンクリックで複製できるブラウザ向けアプリ。単純な操作の繰り返しをなくすために Claude AI を使って開発。",
    tags: [["Claude AI","tag-blue"],["ブラウザ","tag-pink"]]
  },
  "spreadsheet": {
    title: "スプレッドシート作業管理システム",
    desc: "タスクの進捗・優先度・担当を一元管理するスプレッドシートベースの作業管理システム。",
    tags: [["スプレッドシート","tag-mint"]],
    related: [{ id: "work-report", note: "このシステムと連携する報告テンプレート" }]
  },
  "winhero-auto": {
    title: "イベント周回自動クリックツール",
    desc: "モバイルゲーム「WIND BREAKER」のイベントバトルを自動周回するツール。BlueStacks版はADB経由でAndroid内のゲームに直接タップを送信し、クリックアシスタントアプリを不要に。Steam PC版はAutoHotkeyでウィンドウ座標を変換してクリック操作を自動化。どちらもクラッシュ監視・スリープ防止機能付き。座標取得用のCoordPickerツールも同時に開発。",
    tags: [["Claude AI","tag-blue"],["AutoHotkey","tag-mint"],["ADB","tag-purple"]],
    related: [{ id: "autoclicker", note: "元になったオートクリッカー" }]
  },
  "autoclicker": {
    title: "自動クリック（連打）ツール",
    desc: "AutoHotkey を使った自動連打ツール。改良版の開発に再挑戦中。",
    tags: [["AutoHotkey","tag-purple"],["🔧 開発中","tag-blue"]],
    related: [{ id: "winhero-auto", note: "このツールを発展させた自動周回ツール" }]
  },
  "waist-tuck-design": {
    title: "ウエストタックシャツ 比較画像",
    desc: "自作版と AI 生成版を並べた着用イメージ比較。SNS 掲載・紹介文の素材として制作。",
    tags: [["AI生成","tag-pink"],["比較画像","tag-purple"]],
    related: [{ id: "waist-dart", note: "この加工をもとに制作" }]
  },
  "stole-cardigan-design": {
    title: "ストールカーディガン 着用イメージ",
    desc: "モデルを統一したカラー・柄違いの着用イメージ画像。素材のバリエーション展示用。",
    tags: [["AI生成","tag-pink"],["カラー調整","tag-mint"]],
    related: [{ id: "stole-cardigan-making", note: "制作したカーディガンをモデル着用で撮影" }]
  },
  "japanese-garden": {
    title: "AI生成 イラスト・背景集",
    desc: "AIを使って制作したイラストや背景素材をまとめたギャラリー。",
    tags: [["AI生成","tag-blue"],["ギャラリー","tag-mint"]]
  },
  "ink-motion": {
    title: "インクモーション 背景素材",
    desc: "幻想的なインク広がりをテーマにした背景動画案と、桜が舞う演出の動画素材。",
    tags: [["AI生成","tag-blue"],["動画素材","tag-purple"]]
  },
  "line-stamps": {
    title: "LINE スタンプ・絵文字 企画",
    desc: "スタンプ用の画像生成とアニメーション絵文字の構成案を含む、LINE クリエイター向けの制作企画。",
    tags: [["LINE","tag-mint"],["スタンプ","tag-pink"]],
    related: [{ id: "stamp-cutter", note: "ここで生成した画像をカッターで仕上げ" }]
  },
  "waist-dart": {
    title: "シャツへのウエストダーツ加工",
    desc: "既製シャツにウエストダーツを入れてウエストタックシャツに仕立て直す加工。シルエットをすっきりさせる。",
    tags: [["ソーイング","tag-mint"],["リメイク","tag-blue"]],
    related: [{ id: "waist-tuck-design", note: "この加工をもとに比較画像を制作" }]
  },
  "stole-cardigan-making": {
    title: "ストールカーディガン 制作",
    desc: "型紙を改良し、フィンガーホール搭載でコートとして着られるストールカーディガンを制作。次はウォッチホール追加を検討中。",
    tags: [["ソーイング","tag-mint"],["型紙改良","tag-purple"]],
    related: [{ id: "stole-cardigan-design", note: "制作したカーディガンの着用イメージ画像" }]
  },
  "sns-hobby": {
    title: "「最近ハマっていること」投稿文",
    desc: "近況報告・趣味について自然な文体でまとめた SNS 投稿用テキスト。",
    tags: [["SNS","tag-pink"]]
  },
  "waist-tuck-text": {
    title: "ウエストタック シャツ紹介文",
    desc: "おしゃれ寄せ版と SNS 掲載向けの2バリエーション。商品・作品をより魅力的に伝える文章。",
    tags: [["SNS","tag-blue"],["紹介文","tag-mint"]]
  }
};

// URLからIDを取得
const params = new URLSearchParams(location.search);
const id = params.get("id") || "";
const proj = PROJECTS[id];

if (proj) {
  document.title = proj.title + " — ポートフォリオ";
  document.getElementById("nav-title").textContent = proj.title;
  document.getElementById("proj-title").textContent = proj.title;
  document.getElementById("proj-desc").textContent = proj.desc;

  const tagsEl = document.getElementById("proj-tags");
  proj.tags.forEach(([label, cls]) => {
    const s = document.createElement("span");
    s.className = "tag " + cls;
    s.textContent = label;
    tagsEl.appendChild(s);
  });

  // 複数画像ギャラリー（images/フォルダから）
  const staticGallery = document.getElementById("proj-gallery-static");
  const candidates = [
    "images/" + id + ".jpg",
    "images/" + id + ".png",
    ...Array.from({length: 10}, (_, i) => "images/" + id + "-" + (i+1) + ".jpg"),
    ...Array.from({length: 10}, (_, i) => "images/" + id + "-" + (i+1) + ".png"),
  ];
  let loadedCount = 0;
  candidates.forEach(src => {
    const img = new Image();
    img.onload = () => {
      loadedCount++;
      const wrap = document.createElement("div");
      wrap.style.cssText = loadedCount === 1
        ? "border-radius:12px; overflow:hidden; margin-bottom:10px;"
        : "border-radius:12px; overflow:hidden;";
      const el = document.createElement("img");
      el.src = src;
      el.alt = "";
      el.style.cssText = "width:100%; display:block;";
      wrap.appendChild(el);
      if (loadedCount === 1) {
        staticGallery.insertBefore(wrap, staticGallery.firstChild);
      } else {
        if (loadedCount === 2) {
          const grid = document.createElement("div");
          grid.id = "static-grid";
          grid.style.cssText = "display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px;";
          staticGallery.appendChild(grid);
        }
        document.getElementById("static-grid").appendChild(wrap);
      }
    };
    img.src = src;
  });

  if (proj.link) {
    const row = document.getElementById("proj-links");
    const a = document.createElement("a");
    a.href = proj.link.url;
    a.className = "btn btn-primary";
    a.textContent = proj.link.label;
    row.appendChild(a);
  }

  // 関連プロジェクト
  if (proj.related && proj.related.length > 0) {
    document.getElementById("related-section").style.display = "block";
    const list = document.getElementById("related-list");
    proj.related.forEach(({ id: relId, note }) => {
      const rel = PROJECTS[relId];
      if (!rel) return;
      const card = document.createElement("a");
      card.href = "project.html?id=" + relId;
      card.style.cssText = "display:flex; align-items:center; gap:14px; background:rgba(255,255,255,0.88); border-radius:12px; padding:14px 18px; text-decoration:none; border:1px solid rgba(255,255,255,0.6); box-shadow:0 3px 12px rgba(150,190,200,0.15); transition:transform 0.15s;";
      card.onmouseover = () => card.style.transform = "translateY(-2px)";
      card.onmouseout  = () => card.style.transform = "";

      const thumb = document.createElement("div");
      thumb.style.cssText = "width:56px; height:56px; border-radius:10px; overflow:hidden; flex-shrink:0; background:linear-gradient(135deg,#d4f5ea,#e0f2fb); position:relative;";
      const tImg = document.createElement("img");
      tImg.src = "images/" + relId + ".jpg";
      tImg.style.cssText = "width:100%; height:100%; object-fit:cover;";
      tImg.onerror = () => tImg.remove();
      thumb.appendChild(tImg);

      const text = document.createElement("div");
      const noteEl = document.createElement("p");
      noteEl.style.cssText = "font-size:11px; color:#8a9494; margin-bottom:3px;";
      noteEl.textContent = "🔗 " + note;
      const titleEl = document.createElement("p");
      titleEl.style.cssText = "font-size:13px; font-weight:800; color:#5a6e8a;";
      titleEl.textContent = rel.title;
      text.appendChild(noteEl);
      text.appendChild(titleEl);

      card.appendChild(thumb);
      card.appendChild(text);
      list.appendChild(card);
    });
  }
}

// ── パスワードロック ──
const PASSWORD = "yuika2026"; // ← パスワードはここで変更できます
const UNLOCK_KEY = "portfolio_unlocked";
const editSection = document.getElementById("edit-section");
const lockBtn = document.getElementById("lock-btn");

function unlock() {
  sessionStorage.setItem(UNLOCK_KEY, "1");
  editSection.classList.add("unlocked");
  lockBtn.textContent = "🔓";
  lockBtn.title = "編集モード（解除中）";
}

if (sessionStorage.getItem(UNLOCK_KEY) === "1") {
  unlock();
}

lockBtn.addEventListener("click", () => {
  if (editSection.classList.contains("unlocked")) {
    sessionStorage.removeItem(UNLOCK_KEY);
    editSection.classList.remove("unlocked");
    lockBtn.textContent = "🔒";
    lockBtn.title = "編集モード";
  } else {
    const input = prompt("パスワードを入力してください");
    if (input === PASSWORD) {
      unlock();
    } else if (input !== null) {
      alert("パスワードが違います");
    }
  }
});

// ── 画像ギャラリー（localStorage） ──
const STORAGE_KEY = "proj_images_" + id;
let images = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
const gallery = document.getElementById("gallery");

function renderGallery() {
  gallery.innerHTML = "";
  images.forEach((dataUrl, i) => {
    const item = document.createElement("div");
    item.className = "gallery-item has-image";

    const img = document.createElement("img");
    img.src = dataUrl;
    img.alt = "画像 " + (i+1);

    const del = document.createElement("button");
    del.className = "gallery-del";
    del.textContent = "✕";
    del.onclick = (e) => { e.stopPropagation(); images.splice(i, 1); save(); renderGallery(); };

    item.appendChild(img);
    item.appendChild(del);
    gallery.appendChild(item);
  });
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(images));
}

document.getElementById("add-image-btn").addEventListener("click", () => {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";
  input.multiple = true;
  input.onchange = () => {
    Array.from(input.files).forEach(file => {
      const reader = new FileReader();
      reader.onload = e => { images.push(e.target.result); save(); renderGallery(); };
      reader.readAsDataURL(file);
    });
  };
  input.click();
});

renderGallery();

// ── メモ（localStorage） ──
const MEMO_KEY = "proj_memo_" + id;
const memoArea = document.getElementById("memo-area");
const memoSaved = document.getElementById("memo-saved");

memoArea.value = localStorage.getItem(MEMO_KEY) || "";

let saveTimer;
memoArea.addEventListener("input", () => {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    localStorage.setItem(MEMO_KEY, memoArea.value);
    memoSaved.classList.add("show");
    setTimeout(() => memoSaved.classList.remove("show"), 1500);
  }, 600);
});
</script>
</body>
